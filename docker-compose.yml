services:
  backend:
    image: ocr-agent-backend:offline
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ocr-backend
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_URL=http://ollama:11434
      - DATABASE_URL=sqlite:////data/db/ocr.db
      - INPUT_PATH=/data/input
      - OUTPUT_PATH=/data/output
      - ORIGINALS_PATH=/data/originals
      - MODELS_PATH=/data/models
      - SYSTEM_GPU_NAME=${SYSTEM_GPU_NAME:-}
    volumes:
      - ${INPUT_DIR:-./volumes/input}:/data/input:ro
      - ./volumes/output:/data/output
      - ./volumes/originals:/data/originals
      - ./volumes/db:/data/db
      - ./volumes/models:/data/models
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  worker:
    image: ocr-agent-backend:offline
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ocr-worker
    user: "${UID:-1000}:${GID:-1000}"
    command: celery -A celery_worker worker --loglevel=info --concurrency=2 -Q ocr --prefetch-multiplier=1 --pool=threads
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_URL=http://ollama:11434
      - DATABASE_URL=sqlite:////data/db/ocr.db
      - INPUT_PATH=/data/input
      - OUTPUT_PATH=/data/output
      - ORIGINALS_PATH=/data/originals
      - MODELS_PATH=/data/models
      - HF_HOME=/data/models/huggingface
      - TORCH_HOME=/data/models/torch
      - TRANSFORMERS_CACHE=/data/models/huggingface
      - MARKER_MODELS_DIR=/data/models/marker
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
      - SURYA_DEVICE=cpu
      - TROCR_DEVICE=cpu
      - SURYA_TIMEOUT=60
      - TROCR_TIMEOUT=120
    volumes:
      - ${INPUT_DIR:-./volumes/input}:/data/input:ro
      - ./volumes/output:/data/output
      - ./volumes/originals:/data/originals
      - ./volumes/db:/data/db
      - ./volumes/models:/data/models
    depends_on:
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    restart: unless-stopped
    ipc: host
    shm_size: '4gb'

  redis:
    image: redis:7-alpine
    container_name: ocr-redis
    command: redis-server --appendonly yes --appendfilename dump.aof --save 60 1
    volumes:
      - ./volumes/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ollama:
    image: ollama/ollama:rocm
    container_name: ocr-ollama
    ports:
      - "11434:11434"
    volumes:
      - ./volumes/models/ollama:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_MAX_LOADED_MODELS=2
      - HSA_OVERRIDE_GFX_VERSION=${HSA_OVERRIDE_GFX_VERSION:-11.0.0}
      - ROCR_VISIBLE_DEVICES=${ROCR_VISIBLE_DEVICES:-0}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 60s

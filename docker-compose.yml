services:
  backend:
    image: ocr-agent-backend:offline
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ocr-backend
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_URL=http://ollama:11434
      - DATABASE_URL=sqlite:////data/db/ocr.db
      - INPUT_PATH=/data/input
      - OUTPUT_PATH=/data/output
      - ORIGINALS_PATH=/data/originals
      - MODELS_PATH=/data/models
      - SYSTEM_GPU_NAME=${SYSTEM_GPU_NAME:-}
      # El backend solo sirve la API — no procesa OCR, así que no debe cargar
      # Surya/TrOCR/MinerU. Sin esto, la primera llamada a apply_async()
      # dispara el warm-up igual que en el worker, bloqueando esa petición
      # ~2-3 min y duplicando esos modelos en RAM sin necesidad.
      - SKIP_MODEL_WARMUP=1
    volumes:
      - ${INPUT_DIR:-./volumes/input}:/data/input:ro
      - ${OUTPUT_DIR:-./volumes/output}:/data/output
      - ./volumes/originals:/data/originals
      - ./volumes/db:/data/db
      - ./volumes/models:/data/models
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  worker:
    image: ocr-agent-backend:offline
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ocr-worker
    user: "${UID:-1000}:${GID:-1000}"
    command: celery -A celery_worker worker --loglevel=info --concurrency=2 -Q ocr --prefetch-multiplier=1 --pool=threads
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_URL=http://ollama:11434
      - DATABASE_URL=sqlite:////data/db/ocr.db
      - INPUT_PATH=/data/input
      - OUTPUT_PATH=/data/output
      - ORIGINALS_PATH=/data/originals
      - MODELS_PATH=/data/models
      - HF_HOME=/data/models/huggingface
      - TORCH_HOME=/data/models/torch
      - TRANSFORMERS_CACHE=/data/models/huggingface
      - MARKER_MODELS_DIR=/data/models/marker
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
      - SURYA_DEVICE=cpu
      - TROCR_DEVICE=cpu
      - SURYA_TIMEOUT=60
      - TROCR_TIMEOUT=120
    volumes:
      - ${INPUT_DIR:-./volumes/input}:/data/input:ro
      - ${OUTPUT_DIR:-./volumes/output}:/data/output
      - ./volumes/originals:/data/originals
      - ./volumes/db:/data/db
      - ./volumes/models:/data/models
    depends_on:
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    restart: unless-stopped
    ipc: host
    shm_size: '4gb'

  summarizer:
    image: ocr-agent-backend:offline
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ocr-summarizer
    user: "${UID:-1000}:${GID:-1000}"
    # Cola separada de baja concurrencia — resumen ejecutivo + clasificación
    # top-5 vía Ollama (reutiliza qwen2.5:32b, ya cargado). No corre OCR local,
    # así que no compite por CPU/RAM con la cola "ocr".
    command: celery -A celery_worker worker --loglevel=info --concurrency=1 -Q resumen --prefetch-multiplier=1 --pool=threads
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_URL=http://ollama:11434
      - DATABASE_URL=sqlite:////data/db/ocr.db
      - INPUT_PATH=/data/input
      - OUTPUT_PATH=/data/output
      - SKIP_MODEL_WARMUP=1
    volumes:
      - ${INPUT_DIR:-./volumes/input}:/data/input:ro
      - ${OUTPUT_DIR:-./volumes/output}:/data/output
      - ./volumes/db:/data/db
    depends_on:
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ocr-redis
    command: redis-server --appendonly yes --appendfilename dump.aof --save 60 1
    volumes:
      - ./volumes/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ollama:
    image: ollama/ollama:rocm
    container_name: ocr-ollama
    ports:
      - "11434:11434"
    volumes:
      - ./volumes/models/ollama:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_MAX_LOADED_MODELS=2
      - HSA_OVERRIDE_GFX_VERSION=${HSA_OVERRIDE_GFX_VERSION:-11.0.0}
      - ROCR_VISIBLE_DEVICES=${ROCR_VISIBLE_DEVICES:-0}
    restart: unless-stopped
    healthcheck:
      # ollama/ollama:rocm no trae curl instalado — "ollama list" usa el
      # propio binario del contenedor para verificar que el server responde.
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 60s
